<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Grammatik: Präpositionen</title>
    <style>
        :root {
            --taxi-yellow: #f1c40f;
            --dark-blue: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
            --highlight: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
            align-self: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background: var(--taxi-yellow);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-card {
            background: #fdfdfd;
            border: 2px solid #eee;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
        }

        .sentence-text {
            font-size: 1.3rem;
            color: var(--dark-blue);
            line-height: 1.5;
            margin-bottom: 15px;
            font-style: normal; /* Keine Kursivschrift */
        }

        /* Hervorhebung der Präposition */
        .highlight {
            color: var(--highlight);
            font-weight: bold;
            border-bottom: 3px solid var(--highlight);
        }

        .audio-btn {
            background: var(--dark-blue);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .audio-btn:hover { transform: scale(1.1); }

        .instruction {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #edf2f7;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            text-align: center;
            transition: all 0.2s;
            color: var(--dark-blue);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--taxi-yellow);
            background: #fffdf5;
        }

        .option-btn.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724 !important; }
        .option-btn.incorrect { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24 !important; }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-solution { background: #3498db; color: white; }
        .btn-reset { background: #333; color: white; }

        .result-screen { display: none; text-align: center; }

        @media (max-width: 480px) {
            .quiz-container { padding: 15px; }
            .sentence-text { font-size: 1.1rem; }
            .option-btn { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        
        <p class="instruction">Was bedeutet die markierte Präposition in diesem Satz?</p>
        
        <div class="question-card">
            <div class="sentence-text" id="sentenceDisplay">Lade...</div>
            <button class="audio-btn" id="playAudio">🔊</button>
        </div>

        <div class="options-list" id="optionsList"></div>

        <div class="controls">
            <button class="btn-action btn-solution" id="solutionBtn" onclick="showSolution()">Lösung anzeigen</button>
            <button class="btn-action btn-reset" onclick="location.reload()">Neustart</button>
        </div>
    </div>

    <div class="result-screen" id="result-ui">
        <h2>Übung abgeschlossen!</h2>
        <p id="resultText"></p>
        <button class="btn-action btn-solution" onclick="location.reload()" style="margin-top:20px;">Nochmal versuchen</button>
    </div>
</div>

<script>
    const quizData = [
        {
            full: "Положите чемодан в багажник.",
            display: "Положите чемодан <span class='highlight'>в</span> багажник.",
            options: ["in (hinein / Richtung)", "in (drinnen / Ort)", "nach"],
            correct: "in (hinein / Richtung)"
        },
        {
            full: "Я буду пить кофе в машине.",
            display: "Я буду пить кофе <span class='highlight'>в</span> машине.",
            options: ["in (drinnen / Ort)", "in (hinein / Richtung)", "hinter"],
            correct: "in (drinnen / Ort)"
        },
        {
            full: "Оставьте себе сдачу на чай.",
            display: "Оставьте себе сдачу <span class='highlight'>на</span> чай.",
            options: ["für", "auf", "nach"],
            correct: "für"
        },
        {
            full: "Я остановлю после пешеходного перехода.",
            display: "Я остановлю <span class='highlight'>после</span> пешеходного перехода.",
            options: ["nach (zeitlich/räumlich)", "vor", "nahe bei"],
            correct: "nach (zeitlich/räumlich)"
        },
        {
            full: "Высадите меня около того магазина.",
            display: "Высадите меня <span class='highlight'>около</span> того магазина.",
            options: ["nahe bei / beim", "hinter", "auf"],
            correct: "nahe bei / beim"
        },
        {
            full: "Выходить из такси.",
            display: "Выходить <span class='highlight'>из</span> такси.",
            options: ["aus ... heraus", "von", "ohne"],
            correct: "aus ... heraus"
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let maleVoice = null;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => v.lang.startsWith('ru') && 
            (v.name.includes('Pavel') || v.name.includes('Maxim') || v.name.includes('Male'))) 
            || voices.find(v => v.lang.startsWith('ru'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (maleVoice) {
            msg.voice = maleVoice;
            msg.pitch = 0.85;
            msg.rate = 0.85;
        }
        window.speechSynthesis.speak(msg);
    }

    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('sentenceDisplay').innerHTML = data.display;
        document.getElementById('playAudio').onclick = () => speak(data.full);
        document.getElementById('solutionBtn').disabled = false;
        
        const list = document.getElementById('optionsList');
        list.innerHTML = '';
        
        const shuffledOptions = shuffleArray([...data.options]);
        
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => handleChoice(opt, btn);
            list.appendChild(btn);
        });

        document.getElementById('progressFill').style.width = `${(currentIdx / quizData.length) * 100}%`;
    }

    function handleChoice(selected, btn) {
        const correct = quizData[currentIdx].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('solutionBtn').disabled = true;

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('incorrect');
            allBtns.forEach(b => {
                if (b.textContent === correct) b.classList.add('correct');
            });
        }

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1800);
    }

    function showSolution() {
        const correct = quizData[currentIdx].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            b.disabled = true;
            if (b.textContent === correct) b.classList.add('correct');
        });
        document.getElementById('solutionBtn').disabled = true;
        
        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 2200);
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('resultText').textContent = `Du hast ${score} von ${quizData.length} Präpositionen richtig zugeordnet.`;
        document.getElementById('progressFill').style.width = '100%';
    }

    loadQuestion();
</script>

</body>
</html>
