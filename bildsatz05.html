<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Bild-Satz-Zuordnung</title>
    <style>
        :root {
            --taxi-yellow: #f1c40f;
            --dark-blue: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
        }

        h1 { text-align: center; color: var(--dark-blue); font-size: 1.5rem; margin-bottom: 10px; }
        .instruction { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 0.9rem; }

        .matching-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .match-card {
            background: white;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
            user-select: none;
            font-style: normal; /* Keine Kursivschrift */
            color: var(--dark-blue);
        }

        .image-card {
            font-size: 3rem;
            background: #fafafa;
        }

        .sentence-card {
            font-size: 1rem;
            line-height: 1.4;
            justify-content: flex-start;
            text-align: left;
        }

        .match-card:hover:not(.matched) {
            border-color: var(--taxi-yellow);
            background: #fffdf0;
        }

        .match-card.selected {
            border-color: var(--taxi-yellow);
            background: var(--taxi-yellow);
            transform: scale(1.03);
            z-index: 5;
        }

        .match-card.matched {
            border-color: var(--success);
            cursor: default;
            font-weight: bold;
            opacity: 0.9;
        }

        .match-card.error {
            border-color: var(--error);
            background: #f8d7da;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-solution { background: #3498db; color: white; }
        .btn-reset { background: #333; color: white; }

        /* Mobile */
        @media (max-width: 600px) {
            .matching-grid { grid-template-columns: 80px 1fr; gap: 10px; }
            .image-card { font-size: 2rem; }
            .sentence-card { font-size: 0.9rem; padding: 10px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚕 Картинки и фразы</h1>
    <p class="instruction">Klicke auf ein Bild (links) und dann auf den passenden Satz (rechts).</p>

    <div class="matching-grid">
        <div class="column" id="leftCol"></div>
        <div class="column" id="rightCol"></div>
    </div>

    <div class="controls">
        <button class="btn btn-solution" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn btn-reset" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    const pairs = [
        { id: 1, img: "🔒", text: "Не могли бы вы открыть дверь? У меня не получается!", role: "pass" },
        { id: 2, img: "🧳", text: "Помогите мне положить чемодан в багажник.", role: "pass" },
        { id: 3, img: "☕", text: "Вы не против, если я буду пить кофе в машине?", role: "pass" },
        { id: 4, img: "💳", text: "Вы будете платить наличными или картой?", role: "driver" },
        { id: 5, img: "🚶‍♂️", text: "Да, я остановлю после пешеходного перехода.", role: "driver" },
        { id: 6, img: "🪙", text: "Оставьте себе сдачу на чай.", role: "pass" }
    ];

    const solutionPalette = ["#D1E9FF", "#FFD1D1", "#D1FFD1", "#FFF9D1", "#E9D1FF", "#D1FFF9"];

    let selectedLeft = null;
    let maleVoice = null;

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => v.lang.startsWith('ru') && 
            (v.name.includes('Pavel') || v.name.includes('Maxim') || v.name.includes('Male'))) 
            || voices.find(v => v.lang.startsWith('ru'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text, role) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (maleVoice) {
            msg.voice = maleVoice;
            msg.pitch = (role === 'driver') ? 0.8 : 1.1;
            msg.rate = 0.85;
        }
        window.speechSynthesis.speak(msg);
    }

    function init() {
        const leftCol = document.getElementById('leftCol');
        const rightCol = document.getElementById('rightCol');
        
        // Links: Bilder mischen
        const leftItems = [...pairs].sort(() => Math.random() - 0.5);
        leftItems.forEach(p => {
            const div = document.createElement('div');
            div.className = 'match-card image-card';
            div.textContent = p.img;
            div.dataset.id = p.id;
            div.onclick = () => selectLeft(div, p);
            leftCol.appendChild(div);
        });

        // Rechts: Sätze mischen
        const rightItems = [...pairs].sort(() => Math.random() - 0.5);
        rightItems.forEach(p => {
            const div = document.createElement('div');
            div.className = 'match-card sentence-card';
            div.textContent = p.text;
            div.dataset.id = p.id;
            div.onclick = () => selectRight(div, p);
            rightCol.appendChild(div);
        });
    }

    function selectLeft(element, data) {
        if (element.classList.contains('matched')) return;
        document.querySelectorAll('#leftCol .match-card').forEach(c => c.classList.remove('selected'));
        selectedLeft = { element, data };
        element.classList.add('selected');
    }

    function selectRight(element, data) {
        if (element.classList.contains('matched') || !selectedLeft) return;

        if (selectedLeft.data.id === data.id) {
            // RICHTIG
            element.classList.add('matched');
            selectedLeft.element.classList.add('matched');
            
            const color = solutionPalette[data.id % solutionPalette.length];
            element.style.backgroundColor = color;
            selectedLeft.element.style.backgroundColor = color;

            speak(data.text, data.role);
            selectedLeft = null;
        } else {
            // FALSCH
            element.classList.add('error');
            selectedLeft.element.classList.add('error');
            setTimeout(() => {
                element.classList.remove('error');
                if (selectedLeft) selectedLeft.element.classList.remove('error', 'selected');
                selectedLeft = null;
            }, 500);
        }
    }

    function showSolution() {
        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected', 'error'));
        pairs.forEach((pair, index) => {
            const color = solutionPalette[index % solutionPalette.length];
            const l = document.querySelector(`#leftCol .match-card[data-id='${pair.id}']`);
            const r = document.querySelector(`#rightCol .match-card[data-id='${pair.id}']`);
            if (l && r) {
                l.classList.add('matched');
                r.classList.add('matched');
                l.style.backgroundColor = color;
                r.style.backgroundColor = color;
            }
        });
    }

    init();
</script>

</body>
</html>
