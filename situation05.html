<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Matching: Situationen</title>
    <style>
        :root {
            --taxi-yellow: #f1c40f;
            --dark-blue: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
        }

        h1 { text-align: center; color: var(--dark-blue); font-size: 1.5rem; margin-bottom: 10px; }
        .instruction { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 0.9rem; }

        .matching-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background: white;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 60px;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            line-height: 1.3;
            user-select: none;
            font-style: normal; /* Keine Kursivschrift */
            color: var(--dark-blue);
        }

        .match-card:hover:not(.matched) {
            border-color: var(--taxi-yellow);
            background: #fffdf0;
        }

        .match-card.selected {
            border-color: var(--taxi-yellow);
            background: var(--taxi-yellow);
            transform: scale(1.02);
            z-index: 5;
        }

        .match-card.matched {
            border-color: var(--success);
            cursor: default;
            font-weight: bold;
        }

        .match-card.error {
            border-color: var(--error);
            background: #f8d7da;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-solution { background: #3498db; color: white; }
        .btn-reset { background: #333; color: white; }

        @media (max-width: 700px) {
            .matching-grid { grid-template-columns: 1fr; gap: 25px; }
            .column-de { order: 1; }
            .column-ru { order: 2; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚕 Ситуации и фразы</h1>
    <p class="instruction">Klicke links auf die Situation und rechts auf den passenden russischen Satz.</p>

    <div class="matching-grid">
        <div class="column" id="leftCol"></div>
        <div class="column" id="rightCol"></div>
    </div>

    <div class="controls">
        <button class="btn btn-solution" onclick="showSolution()">Lösung anzeigen</button>
        <button class="btn btn-reset" onclick="location.reload()">Neustart</button>
    </div>
</div>

<script>
    const pairs = [
        { id: 1, de: "Bitte um Hilfe beim schweren Koffer.", ru: "Помогите мне положить чемодан в багажник.", role: "pass" },
        { id: 2, de: "Zustimmung des Fahrers, beim Gepäck zu helfen.", ru: "Да, конечно. Кладите!", role: "driver" },
        { id: 3, de: "Fahrer fragt nach der gewünschten Zahlungsart.", ru: "Вы будете платить наличными или картой?", role: "driver" },
        { id: 4, de: "Passagier entscheidet sich für Kartenzahlung.", ru: "Картой, пожалуйста.", role: "pass" },
        { id: 5, de: "Frage, ob man an dieser Stelle aussteigen kann.", ru: "Вы можете высадить меня здесь?", role: "pass" },
        { id: 6, de: "Fahrer sagt, er hält hinter dem Zebrastreifen.", ru: "Да, я остановлю после пешеходного перехода.", role: "driver" },
        { id: 7, de: "Das Wechselgeld als Trinkgeld überlassen.", ru: "Спасибо! Оставьте себе сдачу на чай.", role: "pass" }
    ];

    const solutionPalette = ["#D1E9FF", "#FFD1D1", "#D1FFD1", "#FFF9D1", "#E9D1FF", "#D1FFF9", "#FFD1F9"];

    let selectedLeft = null;
    let maleVoice = null;

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => v.lang.startsWith('ru') && 
            (v.name.includes('Pavel') || v.name.includes('Maxim') || v.name.includes('Male'))) 
            || voices.find(v => v.lang.startsWith('ru'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text, role) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (maleVoice) {
            msg.voice = maleVoice;
            msg.pitch = (role === 'driver') ? 0.8 : 1.1;
            msg.rate = 0.85;
        }
        window.speechSynthesis.speak(msg);
    }

    function init() {
        const leftCol = document.getElementById('leftCol');
        const rightCol = document.getElementById('rightCol');
        
        const leftItems = [...pairs].sort(() => Math.random() - 0.5);
        leftItems.forEach(p => {
            const div = document.createElement('div');
            div.className = 'match-card';
            div.textContent = p.de;
            div.dataset.id = p.id;
            div.onclick = () => selectLeft(div, p);
            leftCol.appendChild(div);
        });

        const rightItems = [...pairs].sort(() => Math.random() - 0.5);
        rightItems.forEach(p => {
            const div = document.createElement('div');
            div.className = 'match-card';
            div.textContent = p.ru;
            div.dataset.id = p.id;
            div.onclick = () => selectRight(div, p);
            rightCol.appendChild(div);
        });
    }

    function selectLeft(element, data) {
        if (element.classList.contains('matched')) return;
        document.querySelectorAll('#leftCol .match-card').forEach(c => c.classList.remove('selected'));
        selectedLeft = { element, data };
        element.classList.add('selected');
    }

    function selectRight(element, data) {
        if (element.classList.contains('matched') || !selectedLeft) return;

        if (selectedLeft.data.id === data.id) {
            element.classList.add('matched');
            selectedLeft.element.classList.add('matched');
            
            const color = solutionPalette[data.id % solutionPalette.length];
            element.style.backgroundColor = color;
            selectedLeft.element.style.backgroundColor = color;

            speak(data.ru, data.role);
            selectedLeft = null;
        } else {
            element.classList.add('error');
            selectedLeft.element.classList.add('error');
            setTimeout(() => {
                element.classList.remove('error');
                if (selectedLeft) selectedLeft.element.classList.remove('error', 'selected');
                selectedLeft = null;
            }, 500);
        }
    }

    function showSolution() {
        document.querySelectorAll('.match-card').forEach(c => c.classList.remove('selected', 'error'));
        pairs.forEach((pair, index) => {
            const color = solutionPalette[index % solutionPalette.length];
            const l = document.querySelector(`#leftCol .match-card[data-id='${pair.id}']`);
            const r = document.querySelector(`#rightCol .match-card[data-id='${pair.id}']`);
            l.classList.add('matched');
            r.classList.add('matched');
            l.style.backgroundColor = color;
            r.style.backgroundColor = color;
        });
    }

    init();
</script>

</body>
</html>
