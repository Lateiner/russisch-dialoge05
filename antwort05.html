<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Taxi-Quiz</title>
    <style>
        :root {
            --taxi-yellow: #f1c40f;
            --dark-blue: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
            align-self: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background: var(--taxi-yellow);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-area {
            background: var(--dark-blue);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .audio-btn {
            background: white;
            color: var(--dark-blue);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .audio-btn:hover { transform: scale(1.1); }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #edf2f7;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            color: var(--dark-blue);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--taxi-yellow);
            background: #fffdf5;
        }

        .option-btn.correct {
            background: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724 !important;
        }

        .option-btn.incorrect {
            background: #f8d7da !important;
            border-color: var(--error) !important;
            color: #721c24 !important;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-restart { background: #333; color: white; }
        .btn-solution { background: #3498db; color: white; }
        .control-btn:hover { opacity: 0.9; }

        .result-screen { display: none; text-align: center; }

        @media (max-width: 480px) {
            .quiz-container { padding: 15px; }
            .question-text { font-size: 1.1rem; }
            .option-btn { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-ui">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        
        <div class="question-area">
            <div class="question-text" id="questionText">Lade Frage...</div>
            <button class="audio-btn" id="playQuestion">🔊</button>
        </div>

        <div class="options-list" id="optionsList"></div>

        <div class="controls">
            <button class="control-btn btn-solution" id="solutionBtn" onclick="showSolution()">Lösung anzeigen</button>
            <button class="control-btn btn-restart" onclick="location.reload()">Neu starten</button>
        </div>
    </div>

    <div class="result-screen" id="result-ui">
        <h2>Übung beendet!</h2>
        <p id="resultText"></p>
        <button class="control-btn btn-restart" onclick="location.reload()" style="margin-top: 20px;">Nochmal versuchen</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Здравствуйте! Я хочу заказать такси на улицу Твернадского, 20.",
            options: [
                { t: "Куда поедете?", correct: true },
                { t: "Высадите меня здесь.", correct: false },
                { t: "Сколько мне ждать?", correct: false }
            ]
        },
        {
            q: "Куda поедете?",
            options: [
                { t: "На улицу Толстого, 24.", correct: true },
                { t: "Здравствуйте!", correct: false },
                { t: "Пять — семь минут.", correct: false }
            ]
        },
        {
            q: "Поездка будет стоить 540 рублей.",
            options: [
                { t: "Хорошо. Сколько ждать?", correct: true },
                { t: "Откуда вас забрать?", correct: false },
                { t: "Синяя Киа Рио.", correct: false }
            ]
        },
        {
            q: "Сколько ждать?",
            options: [
                { t: "Пять — семь минут.", correct: true },
                { t: "На улицу Толстого.", correct: false },
                { t: "Картой, пожалуйста.", correct: false }
            ]
        },
        {
            q: "Вы будете платить наличными или картой?",
            options: [
                { t: "Картой, пожалуйста.", correct: true },
                { t: "Багажник открыт.", correct: false },
                { t: "Пятьсот рублей.", correct: false }
            ]
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let maleVoice = null;
    let currentShuffledOptions = [];

    // Hilfsfunktion zum Mischen von Arrays
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => v.lang.startsWith('ru') && 
            (v.name.includes('Pavel') || v.name.includes('Maxim') || v.name.includes('Male') || v.name.includes('Stefan'))) 
            || voices.find(v => v.lang.startsWith('ru'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (maleVoice) {
            msg.voice = maleVoice;
            msg.pitch = 0.85;
            msg.rate = 0.85;
        }
        window.speechSynthesis.speak(msg);
    }

    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('questionText').textContent = data.q;
        document.getElementById('playQuestion').onclick = () => speak(data.q);
        document.getElementById('solutionBtn').disabled = false;
        
        const list = document.getElementById('optionsList');
        list.innerHTML = '';
        
        // Optionen mischen
        currentShuffledOptions = shuffleArray([...data.options]);
        
        currentShuffledOptions.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt.t;
            btn.dataset.isCorrect = opt.correct;
            btn.onclick = () => handleChoice(opt, btn);
            list.appendChild(btn);
        });

        document.getElementById('progressFill').style.width = `${(currentIdx / quizData.length) * 100}%`;
    }

    function handleChoice(opt, btn) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('solutionBtn').disabled = true;

        if (opt.correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('incorrect');
            allBtns.forEach(b => {
                if (b.dataset.isCorrect === "true") b.classList.add('correct');
            });
        }

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1800);
    }

    function showSolution() {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            b.disabled = true;
            if (b.dataset.isCorrect === "true") b.classList.add('correct');
        });
        document.getElementById('solutionBtn').disabled = true;
        
        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 2200);
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('resultText').textContent = `Du hast ${score} von ${quizData.length} Fragen richtig beantwortet.`;
        document.getElementById('progressFill').style.width = '100%';
    }

    loadQuestion();
</script>

</body>
</html>
