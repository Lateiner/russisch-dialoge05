<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Grammatik: Fälle</title>
    <style>
        :root {
            --taxi-yellow: #f1c40f;
            --dark-blue: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #f8f9fa;
            --highlight: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
            align-self: center;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background: var(--taxi-yellow);
            width: 0%;
            transition: width 0.4s ease;
        }

        .sentence-card {
            background: #fdfdfd;
            border: 2px solid #eee;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
        }

        .sentence-text {
            font-size: 1.3rem;
            color: var(--dark-blue);
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* Hervorhebung des Wortes */
        .highlight {
            color: var(--highlight);
            font-weight: bold;
            text-decoration: underline;
        }

        .audio-btn {
            background: var(--dark-blue);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        @media (min-width: 480px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-btn {
            background: white;
            border: 2px solid #edf2f7;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        .option-btn .case-de { font-weight: bold; font-size: 0.95rem; margin-bottom: 2px; }
        .option-btn .case-ru { font-size: 0.8rem; color: #666; font-style: italic; }

        .option-btn:hover:not(:disabled) {
            border-color: var(--taxi-yellow);
            background: #fffdf5;
        }

        .option-btn.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724 !important; }
        .option-btn.incorrect { background: #f8d7da !important; border-color: var(--error) !important; color: #721c24 !important; }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-action { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #eee; }
        .btn-solution { background: #3498db; color: white; }

        .result-screen { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        
        <p style="text-align:center; color:#777; font-size:0.9rem;">Bestimme den Fall des markierten Wortes:</p>
        
        <div class="sentence-card">
            <div class="sentence-text" id="sentenceDisplay"></div>
            <button class="audio-btn" id="playAudio">🔊</button>
        </div>

        <div class="options-grid" id="optionsList"></div>

        <div class="controls">
            <button class="btn-action btn-solution" id="solutionBtn" onclick="showSolution()">Lösung zeigen</button>
            <button class="btn-action" onclick="location.reload()">Neustart</button>
        </div>
    </div>

    <div class="result-screen" id="result-ui">
        <h2>Grammatik-Check beendet!</h2>
        <p id="resultText"></p>
        <button class="btn-action btn-solution" onclick="location.reload()" style="margin-top:20px;">Nochmal versuchen</button>
    </div>
</div>

<script>
    // Definition der Fälle
    const cases = [
        { id: 1, de: "Nominativ", ru: "Именительный (1)" },
        { id: 2, de: "Genitiv", ru: "Родительный (2)" },
        { id: 3, de: "Dativ", ru: "Дательный (3)" },
        { id: 4, de: "Akkusativ", ru: "Винительный (4)" },
        { id: 5, de: "Instrumental", ru: "Творительный (5)" },
        { id: 6, de: "Präpositional", ru: "Предложный (6)" }
    ];

    const quizData = [
        {
            full: "Я хочу заказать такси.",
            display: "Я хочу заказать <span class='highlight'>такси</span>.",
            ans: 4, // Akkusativ (Wen oder was bestellen?)
            explain: "Wen oder was? Akkusativ (Падеж 4)"
        },
        {
            full: "Водитель такси везёт пассажира.",
            display: "Водитель <span class='highlight'>такси</span> везёт пассажира.",
            ans: 2, // Genitiv (Wessen Fahrer?)
            explain: "Wessen? Genitiv (Падеж 2)"
        },
        {
            full: "Вы едете на улицу Толстого?",
            display: "Вы едете на <span class='highlight'>улицу</span> Толстого?",
            ans: 4, // Akkusativ (Wohin? Richtung)
            explain: "Wohin? Akkusativ (Падеж 4)"
        },
        {
            full: "Вы платите картой?",
            display: "Вы платите <span class='highlight'>картой</span>?",
            ans: 5, // Instrumental (Womit?)
            explain: "Womit? Instrumental (Падеж 5)"
        },
        {
            full: "В такси есть таксист.",
            display: "В <span class='highlight'>такси</span> есть таксист.",
            ans: 6, // Präpositional (Wo? Ort nach 'в')
            explain: "Wo? Präpositional (Падеж 6)"
        },
        {
            full: "Положите чемодан в багажник.",
            display: "Положите чемодан в <span class='highlight'>багажник</span>.",
            ans: 4, // Akkusativ (Wohin?)
            explain: "Wohin? Akkusativ (Падеж 4)"
        },
        {
            full: "Маленький город, где живут мои родители.",
            display: "Маленький <span class='highlight'>город</span>, где живут мои родители.",
            ans: 1, // Nominativ (Subjekt)
            explain: "Wer oder was? Nominativ (Падеж 1)"
        }
    ];

    let currentIdx = 0;
    let score = 0;
    let maleVoice = null;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        maleVoice = voices.find(v => v.lang.startsWith('ru') && 
            (v.name.includes('Pavel') || v.name.includes('Maxim') || v.name.includes('Male'))) 
            || voices.find(v => v.lang.startsWith('ru'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (maleVoice) {
            msg.voice = maleVoice;
            msg.pitch = 0.85;
            msg.rate = 0.85;
        }
        window.speechSynthesis.speak(msg);
    }

    function loadQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('sentenceDisplay').innerHTML = data.display;
        document.getElementById('playAudio').onclick = () => speak(data.full);
        document.getElementById('solutionBtn').disabled = false;
        
        const list = document.getElementById('optionsList');
        list.innerHTML = '';
        
        // Wir zeigen alle 6 Fälle als Optionen an, aber mischen sie
        const shuffledCases = shuffleArray([...cases]);
        
        shuffledCases.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="case-de">${c.de}</span><span class="case-ru">${c.ru}</span>`;
            btn.onclick = () => handleChoice(c.id, btn);
            list.appendChild(btn);
        });

        document.getElementById('progressFill').style.width = `${(currentIdx / quizData.length) * 100}%`;
    }

    function handleChoice(caseId, btn) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        document.getElementById('solutionBtn').disabled = true;

        const correctId = quizData[currentIdx].ans;

        if (caseId === correctId) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('incorrect');
            // Richtigen Button finden und markieren
            allBtns.forEach(b => {
                if (b.querySelector('.case-de').textContent === cases.find(c => c.id === correctId).de) {
                    b.classList.add('correct');
                }
            });
        }

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 2000);
    }

    function showSolution() {
        const allBtns = document.querySelectorAll('.option-btn');
        const correctId = quizData[currentIdx].ans;
        allBtns.forEach(b => {
            b.disabled = true;
            if (b.querySelector('.case-de').textContent === cases.find(c => c.id === correctId).de) {
                b.classList.add('correct');
            }
        });
        document.getElementById('solutionBtn').disabled = true;
        
        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 2500);
    }

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('resultText').textContent = `Du hast ${score} von ${quizData.length} Fällen richtig erkannt.`;
        document.getElementById('progressFill').style.width = '100%';
    }

    loadQuestion();
</script>

</body>
</html>
